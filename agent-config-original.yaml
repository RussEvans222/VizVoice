system:
    instructions: "You are an AI Agent."
    messages:
        welcome: |
            Hi! I'm an AI agent for analytics. You can ask me questions about your data and I'll answer with insights and relevant visualizations. I'll also show you how I arrived at those results.
        error: "Sorry, it looks like something has gone wrong."

config:
    agent_label: "VizVoice"
    agent_type: "AgentforceEmployeeAgent"
    description: "Help people see and understand data with conversational analytics. Analytics and Visualization generates natural language insights, visualizations, and proactive alerts."
    developer_name: "VizVoice"

variables:
    VerifiedCustomerId: mutable string
        description: "This variable may also be referred to as VerifiedCustomerId"
        visibility: "Internal"
    semanticSubMetricId: mutable string
        description: "ID of the semantic sub metric"
        visibility: "External"
    targetEntityId: mutable string = "C360_Semantic_Model_Extended_0ba"
        description: "ID or API name of the dashboard, viz, or metric on the page"
        visibility: "External"
        label: "targetEntityId"
    targetEntityType: mutable string = "sdm"
        description: "One of dashboard, metric, viz"
        visibility: "External"
        label: "targetEntityType"
    targetEntityState: mutable string
        description: "Entity-specific state, like dashboard filters"
        visibility: "External"
    sdmApiName: mutable string = "C360_Semantic_Model_Extended_0ba"
        description: "Semantic Model API Name"
        visibility: "External"
        label: "sdmApiName"
    sdmViewMode: mutable string
        description: "Semantic Model View Mode"
        visibility: "External"
    analytics_pageType: mutable string
        description: "Unified Analytics page type"
        visibility: "External"
    analyticsTabId: mutable string
        description: "Currently active tab ID"
        visibility: "External"
    sdmIds: mutable string = "C360_Semantic_Model_Extended_0ba"
        description: "The IDs of the semantic data models to explore"
        visibility: "External"
        label: "sdmIds"
    visualizationSpecification: mutable string
        description: "The specification used to generate the visualization"
        visibility: "External"
    analyticsConversationId: mutable string
        description: "Currently active conversation ID"
        visibility: "External"
    analyticsConversationContentId: mutable string
        description: "Currently active conversation content ID"
        visibility: "External"

language:
    additional_locales: "en_GB"
    default_locale: "en_US"
    all_additional_locales: False

knowledge:
    citations_enabled: False

start_agent topic_selector:
    label: "Topic Selector"
    description: "Welcome the user and determine the appropriate topic based on user input"
    reasoning:
        instructions: ->
            | Select the best tool to call based on conversation history and user's intent.
        actions:
            go_to_SemanticDataAnalysis: @utils.transition to @topic.SemanticDataAnalysis
            go_to_DataAlertManagement: @utils.transition to @topic.DataAlertManagement
            go_to_VisualizationManagement: @utils.transition to @topic.VisualizationManagement
                available when @variables.analytics_pageType == "visualization"
            go_to_VisualizationManagementCommands: @utils.transition to @topic.VisualizationManagementCommands
                available when @variables.analytics_pageType == "visualization"
            go_to_ambiguous_question: @utils.transition to @topic.ambiguous_question
            go_to_off_topic: @utils.transition to @topic.off_topic

topic SemanticDataAnalysis:
    label: "Semantic Data Analysis"
    description: "Answer an analytical question in the context of a dashboard, visualization, metric, or semantic data model"
    reasoning:
        instructions: ->
            | Your job is to answer analytical questions about visualizations, dashboards, and metrics
              Additional instructions follow:
              - If an action asks for conversationContext, ALWAYS provide the action with the current session history in the following format:  {   "messages": [     {       "role": "Agent",       "message": "..."     },     {       "role": "User",       "message": "..."     }   ] }
              - Always invoke the AnalyzeSemanticData action immediately, without prompting the user for further clarification beforehand
              - You should ALWAYS avoid repeating the content from Answer returned from AnalyzeSemanticData action.
              - You MUST avoid repeating clarification question from the Answer returned from AnalyzeSemanticData action. You should keep your answer more general than the clarification question from the Answer returned from AnalyzeSemanticData action.
              - Always include the complete, untruncated conversation history between 'User' and 'Agent' whenever conversationContext is asked for
              - Always ensure that config is part of conversationContext even if the user asks a new question
              - Always pass the user's most recent chat message as the 'utterance' parameter when invoking the AnalyzeSemanticData action.
              - For any new question in this topic, always invoke the AnalyzeSemanticData action to obtain fresh results, do not reuse or echo prior chat responses
              - ALWAYS use the /show command, Do NOT write the structured data as plain text
        actions:
            AnalyzeSemanticData: @actions.AnalyzeSemanticData
                with targetEntityId=@variables.targetEntityId
                with targetEntityType=@variables.targetEntityType
                with targetEntityState=@variables.targetEntityState
                with conversationContext=...
                with utterance=...
    actions:
        AnalyzeSemanticData:
            description: "Answer an analytical question in the context of a dashboard, visualization, metric, or semantic data model"
            label: "Analyze Data"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Analyzing your data"
            source: "Analytics__AnalyzeSemanticData"
            target: "standardInvocableAction://analyzeSemanticData"
            inputs:
                "targetEntityId": string
                    description: "ID or API name of the dashboard, sdm or metric on the page"
                    label: "Target Entity Id"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "targetEntityType": string
                    description: "One of dashboard, metric or sdm"
                    label: "Target Entity Type"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "targetEntityState": string
                    description: "Entity-specific state, like dashboard filters"
                    label: "Target Entity State"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "conversationContext": string
                    description: "Context of the conversation session"
                    label: "Conversation Context"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "utterance": string
                    description: "User utterance"
                    label: "Utterance"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "currentRecordId": string
                    description: "The Id of the record the user is currently viewing. Use this for information about 'this record', 'current record', 'the record', etc."
                    label: "Current Record Id"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "currentObjectApiName": string
                    description: "The API name of the Salesforce object (such as Account or Opportunity) associated with the record the user wants to interact with. Do not use this if the user is already talking about another object in the conversation."
                    label: "Current Object Api Name"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
            outputs:
                "answer": string
                    description: "Answer to an analytical question"
                    label: "Answer"
                    is_displayable: True
                    filter_from_agent: False
                    complex_data_type_name: "lightning__textType"
                "visualizationMetadata": string
                    description: "Visualization Metadata"
                    label: "Visualization Metadata"
                    is_displayable: True
                    filter_from_agent: True
                    complex_data_type_name: "lightning__textType"
                "answerArtifacts": string
                    description: "Answer Artifacts"
                    label: "Answer Artifacts"
                    is_displayable: True
                    filter_from_agent: True
                    complex_data_type_name: "lightning__textType"

topic DataAlertManagement:
    label: "Data Alert Management"
    description: "Create and manage data alerts"
    reasoning:
        instructions: ->
            | Your job is to help the user create and manage data alerts when in the context of a dashboard or metric details page.
              Additional instructions follow:
              - You MUST always populate the conversationContext Input field with the current session's full conversation context as a JSON object. Each entry should include a "role" to indicate whether the message is from the USER or the AGENT, and a "value" containing the corresponding message content. Based on the conversation history, if user want to update or refine a saved data alert, try to extract this savedDataAlertId from AGENT's message and set it as input for the action. Here's an example conversation context format to follow:  {   "messages": [     {       "role": "USER",       "value": "What's the current date and time?"     },     {       "role": "AGENT",       "value": "The current date and time is xxxxx"     },     {       "role": "USER",       "value": "xxx"     },     {       "role": "AGENT",       "value": {         "savedDataAlertId": "xxx",         "content": "xxx..."       }     }   ] }
              - Always append "include the full conversation context" after each user utterance
              - The targetEntityState is not related to data alert config, so don't use it as alert condition or config
              - The parameter savedDataAlertId is optional and should not be requested from the user if it is not provided.
              - Do NOT invoke this action if user is only asking for information about a data alert. Only invoke if user intention is to create or update, e.g. "let me know if/when", "notify me if" or "Send me an alert when".  If user would like to update an alert they just created, since update is not supported yet, invoke this action to create a new one and make sure to tell user we are creating a new one.
              - ALWAYS use the /show command, Do NOT write the structured data as plain text
        actions:
            CreateDataAlert: @actions.CreateDataAlert
                with targetEntityId=@variables.targetEntityId
                with targetEntityType=@variables.targetEntityType
                with targetEntityState=@variables.targetEntityState
                with conversationContext=...
                with savedDataAlertId=...
    actions:
        CreateDataAlert:
            description: "Create a new alert to be notified when analytical conditions are met in the context of a dashboard or metric"
            label: "Create Data Alert"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Setting up the notification"
            source: "Analytics__CreateDataAlert"
            target: "standardInvocableAction://createDataAlert"
            inputs:
                "targetEntityId": string
                    description: "ID or API name of the dashboard, viz, or metric on the page"
                    label: "Target Entity Id"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "targetEntityType": string
                    description: "One of dashboard, metric, viz"
                    label: "Target Entity Type"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "targetEntityState": string
                    description: "Entity-specific state, like dashboard filters"
                    label: "Target Entity State"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "conversationContext": string
                    description: "Context of the conversation session"
                    label: "Conversation Context"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "savedDataAlertId": string
                    description: "Optional parameter, the ID of the data alert that the user wants to refine"
                    label: "Saved Data Alert Id"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
            outputs:
                "clarificationNeeded": string
                    description: "If clarification is needed, this will contain a question for the user"
                    label: "Clarification Needed"
                    is_displayable: True
                    filter_from_agent: False
                    complex_data_type_name: "lightning__textType"
                "explanatoryReasoning": string
                    description: "Underlying reasoning that was performed in order to generate the data alert configuration"
                    label: "Explanatory Reasoning"
                    is_displayable: True
                    filter_from_agent: False
                    complex_data_type_name: "lightning__textType"
                "savedDataAlertId": string
                    description: "The ID of the saved data alert"
                    label: "Saved Data Alert Id"
                    is_displayable: True
                    filter_from_agent: False
                    complex_data_type_name: "lightning__textType"

